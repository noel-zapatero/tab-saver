<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>tabsaver</title>
    <style>
        body {
            width: 320px;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
        }

        h1 {
            font-size: 15px;
            margin: 0 0 12px 0;
        }

        .save-row {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .save-row input {
            flex: 1;
            padding: 5px 7px;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #ccc;
        }

        .save-row button {
            padding: 5px 10px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
        }

        .section-label {
            font-size: 11px;
            color: #888;
            margin: 0 0 6px 0;
        }

        .session-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }

        .session-row:last-child {
            border-bottom: none;
        }

        .session-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        .session-name {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 11px;
            color: #999;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #bbb;
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            color: #e00;
        }

        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 14px 0;
        }

        #tab-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #tab-list li {
            padding: 3px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #555;
            font-size: 11px;
        }

        .session-info {
            flex: 1;
            /* override the previous version that was missing this */
        }

        .session-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .icon-btn {
            background: none;
            border: 1px solid #ddd;
            color: #666;
            font-size: 13px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 3px;
            line-height: 1.4;
        }

        .icon-btn:hover {
            background: #f5f5f5;
            border-color: #bbb;
        }

        .icon-btn.delete-btn:hover {
            color: #e00;
            border-color: #e00;
            background: #fff5f5;
        }

        .io-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .io-row button, .io-label {
            font-family: monospace;
            font-size: 11px;
            padding: 4px 8px;
            border: 1px solid #ccc;
            background: #fafafa;
            cursor: pointer;
            border-radius: 3px;
            color: #444;
        }

        .io-row button:hover, .io-label:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>
    <h1>tabsaver</h1>

    <div class="save-row">
        <input type="text" id="session-name" placeholder="Nombre de Sesión" />
        <button id="save-btn">Guardar</button>
    </div>

    <p class="section-label">Sesiones Guardadas:</p>
    <div id="sessions-list"></div>
    <div class="io-row">
        <button class="btn" id="export-btn">Exportar JSON</button>
        <label class="io-label"> Importar JSON
            <input type="file" id="import-input" accept=".json" style="display:none" />
        </label>
    </div>
    <hr />

    <p class="section-label">Pestañas Abiertas:</p>
    <ul id="tab-list"></ul>

    <script src="popup.js"></script>
</body>

</html>
