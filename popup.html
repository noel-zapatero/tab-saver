<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>tabsaver</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 340px;
            background: #222121;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
        }

        .header {
            padding: 12px 14px 10px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .header h1 {
            font-size: 14px;
            font-weight: normal;
            letter-spacing: 0.05em;
            color: #fff;
        }

        .header{
            font-size: 10px;
            color: #555;
        }

        .section {
            padding: 10px 14px;
        }

        .section+.section {
            border-top: 1px solid #000000;
        }

        .section-label {
            font-size: 10px;
            color: #ffffff;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .save-row {
            display: flex;
            gap: 6px;
        }

        .save-row input {
            flex: 1;
            padding: 6px 8px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fffdfd;
            font-family: inherit;
            font-size: 12px;
            outline: none;
        }

        .save-row input:focus {
            border-color: #444;
        }

        .save-row input::placeholder {
            color: #757575;
        }

        .btn {
            padding: 6px 11px;
            background: #1e1e1e;
            border: 1px solid #333;
            color: #bbb;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
        }

        .btn:hover {
            background: #252525;
            border-color: #555;
            color: #eee;
        }

        .sessions-list {
            display: flex;
            flex-direction: column;
        }

        .session-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .session-row:last-child {
            border-bottom: none;
        }

        .session-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
            flex: 1;
        }

        .session-name {
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 10px;
            color: #33ff00;
        }

        .session-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .icon-btn {
            background: none;
            border: 1px solid #2a2a2a;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            padding: 2px 7px;
            font-family: inherit;
            line-height: 1.5;
        }

        .icon-btn:hover {
            border-color: #2701b4;
            color: #1900ff;
            background: #1a1a1a;
        }

        .icon-btn.delete-btn:hover {
            color: #cc3333;
            border-color: #551111;
        }

        .empty-msg {
            color: #333;
            font-size: 11px;
            padding: 4px 0;
        }

        .io-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .io-label {
            padding: 5px 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #555;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
        }

        .io-label:hover {
            background: #222;
            border-color: #444;
            color: #999;
        }

        .tabs-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tabs-list li {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #c4c4c4;
            font-size: 11px;
            padding: 1px 0;
        }

        .btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>TabSaver</h1>
    </div>

    <div class="section">
        <div class="save-row">
            <input type="text" id="session-name" placeholder="Nombre de Sesión" />
            <button class="btn" id="save-btn">Guardar</button>
        </div>
    </div>

    <div class="section">
        <div class="section-label">Sesiones</div>
        <div class="sessions-list" id="sessions-list"></div>
        <div class="io-row">
            <button class="btn" id="export-btn" disbaled>Exportar</button>
            <label class="btn">
                Importar
                <input type="file" id="import-input" accept=".json" style="display:none" />
            </label>
        </div>
    </div>

    <div class="section">
        <div class="section-label">Pestañas Abiertas</div>
        <ul class="tabs-list" id="tab-list"></ul>
    </div>

    <script src="popup.js"></script>
</body>

</html>
